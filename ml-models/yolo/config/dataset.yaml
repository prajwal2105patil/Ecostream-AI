# EcoStream AI - Indian Waste Dataset Configuration
# Member 1 (AI/Vision Lead) manages this file

path: data/processed
train: train/images
val: val/images
test: test/images

nc: 20  # number of classes

names:
  0: plastic_pet_bottle
  1: plastic_bag
  2: plastic_wrapper
  3: glass_bottle
  4: glass_broken
  5: paper_newspaper
  6: paper_cardboard
  7: metal_can
  8: metal_scrap
  9: organic_food_waste
  10: organic_leaves
  11: e_waste_phone
  12: e_waste_battery
  13: textile_cloth
  14: rubber_tire
  15: construction_debris
  16: medical_waste_mask
  17: thermocol
  18: tetra_pak
  19: mixed_waste

# Urgency weights for heatmap scoring (higher = more urgent)
# e-waste and hazardous = higher weight
urgency_weights:
  0: 1.0   # plastic_pet_bottle
  1: 1.2   # plastic_bag (pollution risk)
  2: 1.0   # plastic_wrapper
  3: 0.8   # glass_bottle
  4: 1.5   # glass_broken (injury risk)
  5: 0.6   # paper_newspaper
  6: 0.7   # paper_cardboard
  7: 0.9   # metal_can
  8: 1.0   # metal_scrap
  9: 1.3   # organic_food_waste (smell/disease)
  10: 0.5  # organic_leaves
  11: 3.0  # e_waste_phone (toxic)
  12: 4.0  # e_waste_battery (hazardous)
  13: 0.7  # textile_cloth
  14: 1.4  # rubber_tire
  15: 1.6  # construction_debris
  16: 5.0  # medical_waste_mask (biohazard)
  17: 1.1  # thermocol
  18: 0.9  # tetra_pak
  19: 2.0  # mixed_waste (unknown composition)
