version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: ecostream_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ecostream_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: ecostream_chroma
    volumes:
      - ./data/chroma_db:/chroma/chroma
    ports:
      - "8001:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecostream_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ecostream_db
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      ML_MODELS_PATH: /app/ml-models
    volumes:
      - ./data:/app/data
      - ./ml-models:/app/ml-models
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecostream_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    build: ./nginx
    container_name: ecostream_nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/uploads:/app/data/uploads:ro

volumes:
  postgres_data:
